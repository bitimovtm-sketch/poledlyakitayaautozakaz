<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Поле</title>
  <script src="//api.bitrix24.com/api/v1/"></script>
  <style>
    body {
      margin: 0;
      padding: 14px 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      font-size: 16px;
      line-height: 1.7;
      color: #1a1a1a;
    }
    #content {
      background: #f7f9fc;
      border: 1px solid #e3e9f2;
      border-left: 4px solid #2fc6f6;
      border-radius: 8px;
      padding: 16px 20px;
    }
    #content p { margin: 0 0 14px 0; }
    #content p:last-child { margin-bottom: 0; }
    #content b, #content strong { color: #0b2a4a; }
    .empty { color: #9aa5b1; font-style: italic; font-size: 15px; }
  </style>
</head>
<body>
  <div id="content"></div>

  <script>
    var FIELD_CODE = 'UF_CRM_RICH_DESCRIPTION';

    function render(value) {
      var box = document.getElementById('content');
      if (value && String(value).trim() !== '') {
        box.innerHTML = value;
      } else {
        box.innerHTML = '<span class="empty">Нет данных</span>';
      }
      BX24.fitWindow();
    }

    BX24.init(function () {
      var options = BX24.placement.info().options || {};
      var dealId = options.ENTITY_VALUE_ID || options.ID;

      if (dealId) {
        // Читаем свежее значение поля напрямую, чтобы не показывать кешированный VALUE
        BX24.callMethod('crm.deal.get', { id: dealId }, function (res) {
          if (res.error()) {
            render(options.VALUE || '');
          } else {
            var deal = res.data() || {};
            render(deal[FIELD_CODE] || '');
          }
        });
      } else {
        render(options.VALUE || '');
      }
    });
  </script>
</body>
</html>
