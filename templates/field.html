<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Поле</title>
  <script src="//api.bitrix24.com/api/v1/"></script>
  <style>
    body {
      margin: 0;
      padding: 8px 4px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: #333;
    }
    p { margin: 0 0 10px 0; }
    p:last-child { margin-bottom: 0; }
  </style>
</head>
<body>
  <div id="content"></div>

  <script>
    BX24.init(function () {
      var options = BX24.placement.info().options;
      var value = (options && options.VALUE) ? options.VALUE : '';
      document.getElementById('content').innerHTML = value || '<span style="color:#999">Нет данных</span>';
      BX24.fitWindow();
    });
  </script>
</body>
</html>
