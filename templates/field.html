<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Поле</title>
  <script src="//api.bitrix24.com/api/v1/"></script>
  <style>
    body {
      margin: 0;
      padding: 14px 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      font-size: 16px;
      line-height: 1.7;
      color: #1a1a1a;
    }
    #content {
      background: #f7f9fc;
      border: 1px solid #e3e9f2;
      border-left: 4px solid #2fc6f6;
      border-radius: 8px;
      padding: 16px 20px;
    }
    #content p { margin: 0 0 14px 0; font-size: 16px; line-height: 1.7; }
    #content p:last-child { margin-bottom: 0; }
    .empty { color: #9aa5b1; font-style: italic; font-size: 15px; }
  </style>
</head>
<body>
  <div id="content"></div>

  <script>
    // Обычное текстовое поле сделки, откуда берём текст:
    var SOURCE_FIELD = 'UF_CRM_1783482541';

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    // Обычный текст с переносами -> красивый HTML (абзацы + переносы строк)
    function textToHtml(text) {
      var safe = escapeHtml(text);
      // разбиваем на абзацы по пустой строке (учитываем \r\n и \n)
      var paragraphs = safe.split(/\n\s*\n/);
      var htmlParts = [];
      for (var i = 0; i < paragraphs.length; i++) {
        var p = paragraphs[i].replace(/^\s+|\s+$/g, '');
        if (p !== '') {
          htmlParts.push('<p>' + p.replace(/\n/g, '<br>') + '</p>');
        }
      }
      return htmlParts.join('');
    }

    function render(text) {
      var box = document.getElementById('content');
      if (text && String(text).trim() !== '') {
        box.innerHTML = textToHtml(text);
      } else {
        box.innerHTML = '<span class="empty">Нет данных</span>';
      }
      BX24.fitWindow();
    }

    BX24.init(function () {
      var options = BX24.placement.info().options || {};
      var dealId = options.ENTITY_VALUE_ID || options.ID;

      if (dealId) {
        BX24.callMethod('crm.deal.get', { id: dealId }, function (res) {
          if (res.error()) {
            render('');
          } else {
            var deal = res.data() || {};
            render(deal[SOURCE_FIELD] || '');
          }
        });
      } else {
        render('');
      }
    });
  </script>
</body>
</html>
