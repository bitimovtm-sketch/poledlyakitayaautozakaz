<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Установка приложения</title>
  <script src="//api.bitrix24.com/api/v1/"></script>
</head>
<body style="font-family: sans-serif; padding: 20px;">
  <div>Завершаю установку...</div>
  <script>
    // По документации Bitrix24: пока не вызван BX24.installFinish(),
    // приложение считается не установленным (INSTALLED = false),
    // и часть методов REST возвращает 401.
    // Поэтому здесь только завершаем установку. Вся настройка — на главной странице приложения.
    BX24.init(function () {
      BX24.installFinish();
    });
  </script>
</body>
</html>
